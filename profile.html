<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <title>What's that bird? - Profile</title>
    </head>
    <body>
        <header>
            <h1>What's that bird?</h1>
        </header>
        <nav>
            <ul id="main-nav">
                <li>
                    <a
                        href="index.html"
                        class="main-nav__item"
                        aria-label="Home"
                        ><img
                            src="assets/birdhouse.png"
                            alt="Home"
                            aria-hidden="true"
                    /></a>
                </li>
                <li>
                    <a
                        href="bookmark.html"
                        class="main-nav__item"
                        alt="Favourites"
                        aria-label="Favourites"
                        ><img src="assets/feather.png" aria-hidden="true"
                    /></a>
                </li>
                <li>
                    <a
                        href="profile.html"
                        class="main-nav__item--active"
                        aria-label="Profile"
                        ><img
                            src="assets/bird.png"
                            alt="Profile"
                            aria-hidden="true"
                    /></a>
                </li>
            </ul>
        </nav>
        <main>
            <div class="content-wrapper">
                <div class="profile-wrapper">
                    <img
                        src="assets/profileimgs/profile-pic.jpg"
                        class="profile__img"
                    />
                    <div>
                        <h2>Jane Doe</h2>
                        <p>Hobby ornithologist</p>
                    </div>
                </div>
                <div class="about-wrapper">
                    <h3>About me</h3>
                    <p>
                        Based in Hamburg, at home outdoors. I've got a lot of
                        love for all kinds of owls and also for water birds from
                        Africa.
                    </p>
                </div>
                <div class="counter-wrapper">
                    <div class="profile__counter">
                        <img src="assets/message-circle-question-mark.png" />
                        <p>12</p>
                    </div>
                    <div class="profile__counter">
                        <img src="assets/feather.png" />
                        <p>4</p>
                    </div>
                </div>
                <h3>Settings</h3>
                <div class="setting">
                    <p>Dark mode</p>
                    <img src="assets/toggle-left.svg" />
                </div>
            </div>
        </main>
    </body>
</html>
