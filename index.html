<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <title>What's that bird? - Home</title>
    </head>
    <body>
        <header>
            <h1>
                What's that <br />
                bird?
            </h1>
        </header>
        <nav>
            <ul id="main-nav">
                <li>
                    <a
                        href="index.html"
                        class="main-nav__item--active"
                        aria-label="Home"
                        ><img src="assets/birdhouse.png" aria-hidden="true"
                    /></a>
                </li>
                <li>
                    <a
                        href="bookmark.html"
                        class="main-nav__item"
                        aria-label="Favourites"
                        ><img src="assets/feather.png" aria-hidden="true"
                    /></a>
                </li>
                <li>
                    <a
                        href="profile.html"
                        class="main-nav__item"
                        aria-label="Profile"
                        ><img src="assets/bird.png" aria-hidden="true"
                    /></a>
                </li>
            </ul>
        </nav>
        <main>
            <div class="card">
                <button class="card__btn-bookmark">
                    <img src="assets/bookmark-plus.png" />
                </button>
                <img
                    src="assets/birdimgs/birdy-jn3rkjb4.jpg"
                    alt="A little birdy"
                    class="card__img"
                />
                <p>This is a</p>
                <h2 class="card__bird-name card__bird-name--hidden">
                    Mistle Thrush
                </h2>
                <button class="card__btn-solution">Show solution</button>
                <div class="card__tag-wrapper">
                    <p class="card__tag">Lvl 1</p>
                    <p class="card__tag">common</p>
                    <p class="card__tag">songbird</p>
                </div>
            </div>
            <div class="card">
                <button class="card__btn-bookmark">
                    <img src="assets/bookmark-check.png" />
                </button>
                <img
                    src="assets/birdimgs/birdy-6h6587eh.jpg"
                    alt="A little birdy"
                    class="card__img"
                />
                <p>This is a</p>
                <h2 class="card__bird-name">Blackbird</h2>
                <button class="card__btn-solution">Hide solution</button>
                <div class="card__tag-wrapper">
                    <p class="card__tag">Lvl 1</p>
                    <p class="card__tag">common</p>
                    <p class="card__tag">songbird</p>
                </div>
            </div>
        </main>
    </body>
</html>
